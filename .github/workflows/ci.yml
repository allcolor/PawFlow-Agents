name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install $(grep -v scrapling requirements.txt | grep -v '^#' | grep -v '^$')
          pip install build pytest pytest-cov pytest-asyncio pytest-mock

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -x -q --tb=short

      - name: Build wheel and smoke-test installed CLI
        run: |
          python -m build --wheel
          python -m venv --system-site-packages /tmp/pawflow-wheel-smoke
          /tmp/pawflow-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/pawflow-wheel-smoke/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/pawflow-wheel-smoke/bin/pawflow --version
          /tmp/pawflow-wheel-smoke/bin/pawcode --version
          /tmp/pawflow-wheel-smoke/bin/python -c "import cli; from core.llm_providers import claude_code_interactive; from tools.fs_actions import _diagnose_edit_mismatch"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit ruff

      - name: Check syntax (compile all Python files)
        run: |
          python -m compileall -q cli.py core/ engine/ tasks/ services/ pawflow_cli/ pawflow_relay/ tools/

      - name: Ruff lint (errors only)
        run: |
          ruff check --select=E9,F63,F7,F82 --no-fix cli.py core/ engine/ tasks/ services/ pawflow_cli/ pawflow_relay/ tools/

      - name: Bandit security lint
        run: |
          bandit -q -r cli.py core/ engine/ tasks/ services/ pawflow_cli/ pawflow_relay/ tools/ 2>/tmp/pawflow-bandit-warnings.log
