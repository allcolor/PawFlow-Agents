name: Docker Images

on:
  push:
    tags: ['v*.*.*', '*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: allcolor
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: pawflow
            context: .
            dockerfile: Dockerfile
          - image: pawflow-relay-minimal
            context: docker/relay-generated/server-minimal
            dockerfile: docker/relay-generated/server-minimal/Dockerfile
            generate: true
          - image: pawflow-relay-dev
            context: .
            dockerfile: docker/relay-dev/Dockerfile

    steps:
      - uses: actions/checkout@v5

      - name: Free runner disk space
        run: |
          sudo rm -rf \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /usr/share/swift \
            /usr/local/.ghcup
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check existing image tag
        id: existing
        run: |
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.ref_name }}"
          if docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists, skipping rebuild: $image"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate minimal relay image context
        if: matrix.generate == true && steps.existing.outputs.exists != 'true'
        run: |
          python3 scripts/generate-relay-image.py \
            --profile server-minimal \
            --out docker/relay-generated/server-minimal \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.ref_name }}

      - name: Docker metadata
        if: steps.existing.outputs.exists != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=PawFlow ${{ matrix.image }}
            org.opencontainers.image.description=PawFlow redistributable Docker image
            org.opencontainers.image.vendor=AllColor
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.documentation=https://github.com/allcolor/PawFlow-Agents/blob/main/THIRD_PARTY_NOTICES.md

      - name: Build and push
        if: steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
