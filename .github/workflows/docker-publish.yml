name: Docker Images

on:
  push:
    tags: ['v*.*.*', '*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: Image tag to publish, for example 1.0.0.prealpha.1
        required: true
      force_rebuild:
        description: Rebuild and push even if the GHCR tag already exists
        type: boolean
        default: false
      force_rebuild_relay:
        description: Rebuild relay images even if the configured relay image tag already exists
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: allcolor
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: pawflow
            context: .
            dockerfile: Dockerfile
          - image: pawflow-relay-minimal
            context: docker/relay-generated/server-minimal
            dockerfile: docker/relay-generated/server-minimal/Dockerfile
            generate: true
          - image: pawflow-relay-dev
            context: .
            dockerfile: docker/relay-dev/Dockerfile

    steps:
      - uses: actions/checkout@v5

      - name: Resolve image tag
        id: release
        run: |
          raw="${{ inputs.version || github.ref_name }}"
          pawflow_tag="${raw#v}"
          relay_tag="$(python3 - <<'PY'
          import json
          with open('config/relay_image_catalog.json', encoding='utf-8') as f:
              print(json.load(f)['relay_image_version'])
          PY
          )"
          echo "image_tag=$pawflow_tag" >> "$GITHUB_OUTPUT"
          echo "relay_image_tag=$relay_tag" >> "$GITHUB_OUTPUT"
          echo "force_rebuild=${{ inputs.force_rebuild || false }}" >> "$GITHUB_OUTPUT"
          echo "force_rebuild_relay=${{ inputs.force_rebuild_relay || false }}" >> "$GITHUB_OUTPUT"

      - name: Resolve effective image tag
        id: effective
        run: |
          case "${{ matrix.image }}" in
            pawflow)
              echo "tag=${{ steps.release.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
              echo "force=${{ steps.release.outputs.force_rebuild }}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "tag=${{ steps.release.outputs.relay_image_tag }}" >> "$GITHUB_OUTPUT"
              if [[ "${{ steps.release.outputs.force_rebuild_relay }}" == "true" ]]; then
                echo "force=true" >> "$GITHUB_OUTPUT"
              else
                echo "force=${{ steps.release.outputs.force_rebuild }}" >> "$GITHUB_OUTPUT"
              fi
              ;;
          esac

      - name: Free runner disk space
        run: |
          sudo rm -rf \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /usr/share/swift \
            /usr/local/.ghcup
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check existing image tag
        id: existing
        run: |
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.effective.outputs.tag }}"
          if [[ "${{ steps.effective.outputs.force }}" == "true" ]]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Force rebuild requested: $image"
            exit 0
          fi
          if docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists, skipping rebuild: $image"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate minimal relay image context
        if: matrix.generate == true && steps.existing.outputs.exists != 'true'
        run: |
          python3 scripts/generate-relay-image.py \
            --profile server-minimal \
            --out docker/relay-generated/server-minimal \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.effective.outputs.tag }}

      - name: Docker metadata
        if: steps.existing.outputs.exists != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.effective.outputs.tag }}
          labels: |
            org.opencontainers.image.title=PawFlow ${{ matrix.image }}
            org.opencontainers.image.description=PawFlow redistributable Docker image
            org.opencontainers.image.vendor=AllColor
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.documentation=https://github.com/allcolor/PawFlow-Agents/blob/main/THIRD_PARTY_NOTICES.md

      - name: Build and push
        if: steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PAWFLOW_DOCKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.effective.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: false
          provenance: false
