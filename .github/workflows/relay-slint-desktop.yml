name: Relay Slint Desktop

on:
  push:
    branches: [main]
    paths:
      - 'pawflow-relay-slint/**'
      - 'pawflow_relay/**'
      - 'tools/fs_actions.py'
      - 'scripts/generate-relay-image.py'
      - 'config/relay_image_catalog.json'
      - '.github/workflows/relay-slint-desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pawflow-relay-slint/**'
      - 'pawflow_relay/**'
      - 'tools/fs_actions.py'
      - 'scripts/generate-relay-image.py'
      - 'config/relay_image_catalog.json'
      - '.github/workflows/relay-slint-desktop.yml'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: pawflow-relay-slint-linux
            bin: pawflow-relay-slint
          - os: windows-latest
            artifact: pawflow-relay-slint-windows
            bin: pawflow-relay-slint.exe
          - os: macos-latest
            artifact: pawflow-relay-slint-macos
            bin: pawflow-relay-slint

    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Linux Slint dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libfontconfig1-dev libxkbcommon-dev

      - name: Prepare embedded runtime
        run: python pawflow-relay-slint/scripts/prepare-runtime.py --repo-root . --out pawflow-relay-slint/runtime

      - name: Check
        working-directory: pawflow-relay-slint
        run: cargo check --locked

      - name: Build release
        working-directory: pawflow-relay-slint
        run: cargo build --release --locked

      - name: Assemble artifact
        shell: bash
        run: |
          set -euo pipefail
          out="dist/${{ matrix.artifact }}"
          mkdir -p "$out"
          cp "pawflow-relay-slint/target/release/${{ matrix.bin }}" "$out/"
          cp -R pawflow-relay-slint/runtime "$out/runtime"
          cp pawflow-relay-slint/README.md "$out/README.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
