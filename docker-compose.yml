version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENPAW_CORS_ORIGINS=http://localhost:8501,http://localhost:8000
      - OPENPAW_SECRET_KEY=${OPENPAW_SECRET_KEY:-changeme}
      - OPENPAW_RATE_LIMIT=true
    volumes:
      - ./flows:/app/flows
      - ./config:/app/config
      - ./plugins:/app/plugins
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  gui:
    build: .
    command: ["python", "-m", "streamlit", "run", "gui/main.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true"]
    ports:
      - "8501:8501"
    environment:
      - OPENPAW_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # Optional: PostgreSQL backend
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=openpaw
      - POSTGRES_USER=openpaw
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-openpawsecret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - postgres

volumes:
  pgdata:
