services:
  pawflow:
    build: .
    ports:
      - "${PAWFLOW_PORT}:8000"
    environment:
      - PAWFLOW_CORS_ORIGINS=${PAWFLOW_CORS_ORIGINS}
      - PAWFLOW_SECRET_KEY=${PAWFLOW_SECRET_KEY}
      - PAWFLOW_AUTH_ENABLED=${PAWFLOW_AUTH_ENABLED}
      - PAWFLOW_RATE_LIMIT=${PAWFLOW_RATE_LIMIT}
      - PAWFLOW_RATE_LIMIT_MAX=${PAWFLOW_RATE_LIMIT_MAX}
      - PAWFLOW_MAX_BODY_SIZE=${PAWFLOW_MAX_BODY_SIZE}
    volumes:
      - ./flows:/app/flows
      - ./config:/app/config
      - ./data:/app/data
      - ./plugins:/app/plugins
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: relay container for sandboxed tool execution
  relay:
    build: docker/relay-dev
    volumes:
      - relay-workspace:/workspace
    environment:
      - PAWFLOW_SERVER=ws://pawflow:8000/ws/relay
    depends_on:
      pawflow:
        condition: service_healthy
    profiles:
      - relay

  # Optional: PostgreSQL backend
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=pawflow
      - POSTGRES_USER=pawflow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - postgres

volumes:
  pgdata:
  relay-workspace:
