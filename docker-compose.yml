services:
  pawflow:
    build: .
    ports:
      - "9090:9090"
    environment:
      - PAWFLOW_SECRET_KEY=${PAWFLOW_SECRET_KEY}
      - PAWFLOW_SECRET_KEY_B64=${PAWFLOW_SECRET_KEY_B64}
      - PAWFLOW_ENV=${PAWFLOW_ENV}
      - PAWFLOW_PUBLIC_MODE=${PAWFLOW_PUBLIC_MODE}
    volumes:
      - ./flows:/app/flows
      - ./config:/app/config
      - ./data:/app/data
      - ./plugins:/app/plugins
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import ssl
          import sys
          import urllib.request

          checks = [
              ("https://localhost:9090/health", ssl._create_unverified_context()),
              ("http://localhost:9090/health", None),
          ]
          last = None
          for url, ctx in checks:
              try:
                  urllib.request.urlopen(url, context=ctx, timeout=5).close()
                  sys.exit(0)
              except Exception as exc:
                  last = exc
          raise SystemExit(str(last))
          PY
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: relay container for sandboxed tool execution
  relay:
    build: docker/relay-dev
    volumes:
      - relay-workspace:/workspace
      # Mount point for the server-fs FUSE proxy. Bind-propagation must
      # be `rshared` so the FUSE mount that the relay daemon creates
      # under /cc_sessions becomes visible to anything that bind-mounts
      # from this container later (and to host /var/lib/pawflow/server-fs
      # if you want to inspect from outside).
      - /var/lib/pawflow/server-fs:/cc_sessions:rshared
    environment:
      - PAWFLOW_SERVER=ws://pawflow:9090/ws/relay
      - PAWFLOW_SERVER_MOUNT=/cc_sessions
    # FUSE in a container needs CAP_SYS_ADMIN, /dev/fuse, and an apparmor
    # profile that doesn't sandbox the mount syscall.
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    depends_on:
      pawflow:
        condition: service_healthy
    profiles:
      - relay

  # Optional: PostgreSQL backend
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=pawflow
      - POSTGRES_USER=pawflow
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - postgres

volumes:
  pgdata:
  relay-workspace:
